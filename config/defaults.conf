#!/usr/bin/env bash
################################################################################
# defaults.conf - 框架默认配置
#
# 所有可配置参数集中定义。使用 ${VAR:=default} 模式，保证三层优先级：
#   环境变量 > 项目级覆盖 (.swarm/swarm.conf) > 本文件默认值
#
# 约束: 所有配置项必须使用 : "${VAR:=value}" 格式（load_project_config
#        通过 grep '${VAR:=' 提取变量名来实现优先级覆盖）
#
# 项目级覆盖示例 ($PROJECT_DIR/.swarm/swarm.conf):
#   : "${LOG_MAX_SIZE:=5242880}"   # :=模式，覆盖默认但环境变量优先
#   GATE_TIMEOUT=300               # 直接赋值，覆盖默认和环境变量
################################################################################

# === 日志 ===
: "${LOG_TIMESTAMP_FORMAT:=%Y-%m-%d %H:%M:%S}"  # 统一时间戳格式
: "${LOG_MAX_SIZE:=10485760}"          # 单文件最大字节（默认 10MB）
: "${LOG_ROTATE_INTERVAL:=300}"        # 轮转检查间隔（秒）
: "${LOG_RETENTION_TTL:=604800}"       # 所有日志最大保留时间（秒，默认 7 天）
: "${GATE_LOG_TTL:=86400}"             # 质量门日志保留时间（秒，默认 24h）

# === 质量门 ===
: "${GATE_TIMEOUT:=120}"               # 单个检查命令超时（秒）
: "${SKIP_GATE_TYPES:=review design architecture audit document plan}"

# === 任务看门狗 ===
: "${WATCHDOG_INTERVAL:=60}"           # 巡检间隔（秒）
: "${TASK_PROCESSING_TTL:=21600}"      # 任务最大处理时长（秒，默认 6h，0=禁用）

# === 任务重试 ===
: "${TASK_MAX_RETRIES:=3}"                # 最大重试次数（0=不重试直接 fail）
: "${TASK_RETRY_BASE_DELAY:=60}"          # 重试基础延迟（秒，实际: 2^retry_count * base）

# === 子任务 ===
: "${SUBTASK_MAX_DEPTH:=3}"                  # 子任务最大嵌套深度（1=等同旧行为，0=禁止拆分）
: "${SUBTASK_MAX_COUNT:=10}"              # 单个父任务最大子任务数
: "${SUBTASK_STALL_TTL:=7200}"            # 子任务组停滞检测阈值（秒，默认 2h）
: "${ESCALATE_STALL_TTL:=3600}"          # 上报任务未被处理的超时阈值（秒，默认 1h）

# === 消息清理 ===
: "${CLEANUP_TTL:=3600}"               # 过期消息/任务 TTL（秒）

# === tmux ===
: "${PANES_PER_WINDOW:=1}"             # 每窗口 pane 数
